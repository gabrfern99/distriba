name: Build, Push and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to remote server
        uses: appleboy/ssh-action@v1
        with:
          host: 129.148.46.20
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/distriba

            # Stop old build-based containers (first time only, harmless if already stopped)
            docker compose -f docker-compose.yml down 2>/dev/null || true

            # Pull latest repo changes (gets updated docker-compose.prod.yml, prisma, etc.)
            git pull origin main || true

            # Ensure .env has all required vars (add missing ones, don't overwrite existing)
            touch .env
            grep -q "^AUTH_SECRET=" .env || echo 'AUTH_SECRET=supersecret-change-in-production' >> .env
            grep -q "^AUTH_URL=" .env || echo 'AUTH_URL=https://distriba.quiropatecnologia.com.br/' >> .env
            grep -q "^COSMOS_API_TOKEN=" .env || echo 'COSMOS_API_TOKEN=KZpxzMef-dp5QH5uvSs5Dw' >> .env

            # Login to GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u gabrfern99 --password-stdin

            # Pull latest image and restart
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d

            # Clean old images
            docker image prune -f
